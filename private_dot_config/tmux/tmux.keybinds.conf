unbind-key -a

# ── Pane navigation (no prefix — biggest keypress savings) ───────────────────
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ── Window navigation (no prefix) ───────────────────────────────────────────
bind -n M-H previous-window
bind -n M-L next-window

# ── Splits (visual mnemonics: - and \ look like the split) ──────────────────
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# ── Windows ─────────────────────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind a last-window
bind r command-prompt "rename-window %%"
bind w list-windows

# ── Sessions ────────────────────────────────────────────────────────────────
bind S choose-session
bind d detach

# ── Pane management ─────────────────────────────────────────────────────────
bind x kill-pane
bind z resize-pane -Z
bind X swap-pane -D
bind * setw synchronize-panes
bind P set pane-border-status

# ── Pane resize (repeatable — hold prefix, tap key) ─────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode ───────────────────────────────────────────────────────────────
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ── Misc ────────────────────────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf
bind : command-prompt

# ── Global (no prefix) ─────────────────────────────────────────────────────
bind-key -n C-n display-popup -E nvim -c ":ObsidianNew"
bind-key -n C-q display-popup -w "90%" -h "85%" -E nvim -c ":ObsidianSearch"
