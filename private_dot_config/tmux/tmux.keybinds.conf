# ══════════════════════════════════════════════════════════════════════════════
# TMUX KEYBIND REFERENCE
# ══════════════════════════════════════════════════════════════════════════════
# Legend:  [default]  = tmux built-in default (no config needed)
#          [custom]   = defined below or in tmux.conf
#          [plugin]   = provided by a plugin
#          [no-pfx]   = fires without prefix key
#          -r         = repeatable (hold prefix, keep pressing key)
#
# PREFIX KEY: Ctrl+B  [default]
# ──────────────────────────────────────────────────────────────────────────────
#
# ── SESSIONS ──────────────────────────────────────────────────────────────────
# prefix + d          Detach from session                          [default]
# prefix + s          List / switch sessions (tree view)           [default]
# prefix + $          Rename current session                       [default]
# prefix + (          Switch to previous session                   [default]
# prefix + )          Switch to next session                       [default]
# prefix + L          Switch to last (most recently used) session  [default]
# prefix + o          Open sessionx fuzzy session picker           [plugin]
#
# ── WINDOWS ───────────────────────────────────────────────────────────────────
# prefix + c          New window (opens in current path)           [custom]
# prefix + ,          Rename current window                        [default]
# prefix + r          Rename current window (alias)                [custom]
# prefix + &          Kill current window                          [default]
# prefix + n          Next window                                  [default]
# prefix + p          Previous window                              [default]
# prefix + l          Last (most recently used) window             [default]
# prefix + w          Interactive window / session tree            [default]
# prefix + 0-9        Select window by number                      [default]
# prefix + '          Select window by number prompt               [default]
# M-H (Alt+Shift+H)   Previous window (no prefix)                  [custom, no-pfx]
# M-L (Alt+Shift+L)   Next window (no prefix)                      [custom, no-pfx]
#
# ── PANES ─────────────────────────────────────────────────────────────────────
# prefix + "          Split pane horizontally (top/bottom)         [default]
# prefix + %          Split pane vertically (left/right)           [default]
# prefix + -          Split pane horizontally in current path      [custom]
# prefix + \          Split pane vertically in current path        [custom]
# prefix + x          Kill current pane                            [default]
# prefix + z          Toggle pane zoom (fullscreen)                [default]
# prefix + q          Show pane numbers (press number to jump)     [default]
# prefix + Space      Cycle through pane layouts                   [default]
# prefix + {          Swap pane with previous pane                 [default]
# prefix + }          Swap pane with next pane                     [default]
# prefix + !          Break pane into new window                   [default]
# prefix + Arrow      Select pane by direction                     [default]
# prefix + o          Cycle to next pane                           [default]
# C-h/j/k/l          Navigate panes + nvim splits (no prefix)     [plugin, no-pfx]
# prefix + H          Resize pane left  5 cells (repeatable)       [custom, -r]
# prefix + J          Resize pane down  5 cells (repeatable)       [custom, -r]
# prefix + K          Resize pane up    5 cells (repeatable)       [custom, -r]
# prefix + L          Resize pane right 5 cells (repeatable)       [custom, -r]
#
# ── COPY MODE (vi) ────────────────────────────────────────────────────────────
# prefix + [          Enter copy mode                              [default]
# q                   Exit copy mode                               [default]
# v                   Begin visual selection                       [custom]
# V                   Select entire line                           [default]
# y                   Copy selection to clipboard (tmux-yank)      [plugin]
# Y                   Copy line to clipboard                       [plugin]
# /                   Search forward                               [default]
# ?                   Search backward                              [default]
# n / N               Next / previous search match                 [default]
# g / G               Jump to top / bottom                         [default]
# H / M / L          Jump to top / middle / bottom of view        [default]
# C-u / C-d          Scroll half-page up / down                   [default]
# prefix + ]          Paste buffer                                  [default]
# prefix + =          Choose paste buffer from list                [default]
#
# ── COMMAND / MISC ────────────────────────────────────────────────────────────
# prefix + :          Open command prompt                          [default]
# prefix + ?          List all key bindings                        [default]
# prefix + t          Show clock                                   [default]
# prefix + ~          Show tmux messages                           [default]
# prefix + M-n        UNBOUND (was next-window -a; conflicts with ~ on macOS)
# prefix + i          Show current window info                     [default]
# prefix + R          Reload tmux config                           [custom]
#
# ── PLUGINS ───────────────────────────────────────────────────────────────────
# TPM (Tmux Plugin Manager):
# prefix + I          Install new plugins (capital i)              [tpm]
# prefix + U          Update installed plugins                     [tpm]
# prefix + M-u        Uninstall plugins removed from config        [tpm]
#
# prefix + Ctrl+s     Save session (tmux-resurrect)                [plugin]
# prefix + Ctrl+r     Restore session (tmux-resurrect)             [plugin]
# prefix + Space      Thumbs hint picker (tmux-thumbs)             [plugin]
# prefix + F          tmux-fzf menu                                [plugin]
# prefix + u          URL picker via fzf (tmux-fzf-url)            [plugin]
# C-n                 ObsidianNew popup (no prefix)                [custom, no-pfx]
# C-q                 ObsidianSearch popup (no prefix)             [custom, no-pfx]
#
# ── QUICK REFERENCE — STATUS BAR VARIABLES ───────────────────────────────────
# #{session_name}     Current session name
# #{window_index}     Current window number
# #{window_name}      Current window name    (#W short form)
# #{pane_index}       Current pane number
# #{pane_current_path} Current pane working directory
# #{b:pane_current_path} Basename only
# #{?window_zoomed_flag,(),} Conditional: show () when zoomed
# ══════════════════════════════════════════════════════════════════════════════

# All bindings are ADDITIVE — defaults (Ctrl+B prefix) remain fully intact.
# Pane navigation: C-hjkl handled by vim-tmux-navigator (works in nvim splits too).

# ── Window navigation (Alt+Shift+HL, no prefix needed) ───────────────────────
bind -n M-H previous-window
bind -n M-L next-window

# ── Splits (aliases alongside defaults " and %) ───────────────────────────────
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# ── New window in current path (default c opens in home dir) ─────────────────
bind c new-window -c "#{pane_current_path}"

# ── Rename window (default , also works) ─────────────────────────────────────
bind r command-prompt "rename-window %%"

# ── Pane resize (repeatable) ─────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode — vi visual selection ──────────────────────────────────────────
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ── Reload config ─────────────────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf

# ── Obsidian popups (global, no prefix) ───────────────────────────────────────
# ── Unbind Alt+n so ~ key works (Alt+n produces ~ on macOS intl keyboards) ──
unbind -T prefix M-n

bind-key -n C-n display-popup -E nvim -c ":ObsidianNew"
bind-key -n C-q display-popup -w "90%" -h "85%" -E nvim -c ":ObsidianSearch"

# ── Mouse scroll: 2 lines at a time, auto-enters copy mode ─────────────────
bind-key -n WheelUpPane   if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t=; if-shell -F '#{pane_in_mode}' 'send-keys -X -N 2 scroll-up' 'copy-mode -e; send-keys -X -N 2 scroll-up'"
bind-key -n WheelDownPane if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t=; send-keys -X -N 2 scroll-down"
bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down
