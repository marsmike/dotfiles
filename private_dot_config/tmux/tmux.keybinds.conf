# All bindings are ADDITIVE — defaults (Ctrl+B prefix) remain fully intact.
# Pane navigation: C-hjkl handled by vim-tmux-navigator (works in nvim splits too).

# ── Window navigation (Alt+Shift+HL, no prefix needed) ───────────────────────
bind -n M-H previous-window
bind -n M-L next-window

# ── Splits (aliases alongside defaults " and %) ───────────────────────────────
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# ── New window in current path (default c opens in home dir) ─────────────────
bind c new-window -c "#{pane_current_path}"

# ── Rename window (default , also works) ─────────────────────────────────────
bind r command-prompt "rename-window %%"

# ── Pane resize (repeatable) ─────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode — vi visual selection ──────────────────────────────────────────
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ── Reload config ─────────────────────────────────────────────────────────────
bind R source-file ~/.config/tmux/tmux.conf

# ── Obsidian popups (global, no prefix) ───────────────────────────────────────
bind-key -n C-n display-popup -E nvim -c ":ObsidianNew"
bind-key -n C-q display-popup -w "90%" -h "85%" -E nvim -c ":ObsidianSearch"
